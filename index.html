<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        /* 기존 스타일 유지 */
        .ti-container { max-width: 950px; margin: 0 auto; font-family: 'Noto Serif KR', 'Nanum Myeongjo', serif; color: #333; }
        .ti-header { width: 100%; margin-bottom: 30px; }
        .ti-header img { width: 100%; height: auto; display: block; }
        .ti-content-wrap { padding: 0 40px; }
        .ti-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; }
        .ti-summary { background-color: #f9f9f9; padding: 15px 25px; border-radius: 10px; font-size: 0.95rem; margin-bottom: 40px; }
        .ti-invisible-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 25px; margin-bottom: 30px; align-items: stretch; }
        .ti-col { min-width: 0; }
        .ti-img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }
        .ti-center-abs { display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding: 0 10px; }
        .ti-quote { position: relative; background-color: #f9f9f9; border: 1px solid #ddd; padding: 20px; border-radius: 15px; font-size: 0.9rem; margin: 10px 0; }
        .ti-name { margin-top: 15px; font-weight: bold; font-size: 1rem; display: flex; align-items: center; color: #333 !important; text-decoration: none !important; }
        
        /* 페이지 이동 버튼 스타일 */
        .page-nav { display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding-bottom: 50px; }
        .nav-btn { cursor: pointer; padding: 10px 20px; background: #eee; border: none; border-radius: 5px; font-weight: bold; }
        .swiper { width: 100%; overflow: hidden; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper">
        
        <div class="swiper-slide">
            <div class="ti-container">
                <div class="ti-header"><img src="https://i.imgur.com/UzbqQxA.png" /></div>
                <div class="ti-content-wrap">
                    <div class="ti-title">사담 (巳潭) | 페이지 1</div>
                    <div class="ti-invisible-grid">
                        <div class="ti-col"><img class="ti-img" src="https://i.imgur.com/jr2nTx1.png" /> <a class="ti-name">사</a></div>
                        <div class="ti-center-abs">
                            <div class="ti-quote">첫 번째 페이지 내용입니다.</div>
                        </div>
                        <div class="ti-col"><img class="ti-img" src="https://i.imgur.com/qBKZW5X.png" /> <a class="ti-name">서담</a></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="ti-container">
                <div class="ti-header"><img src="https://i.imgur.com/UzbqQxA.png" /></div>
                <div class="ti-content-wrap">
                    <div class="ti-title">사담 (巳潭) | 페이지 2</div>
                    <div class="ti-invisible-grid">
                        <div class="ti-col"><img class="ti-img" src="https://i.imgur.com/jr2nTx1.png" /> <a class="ti-name">사</a></div>
                        <div class="ti-center-abs">
                            <div class="ti-quote">두 번째 페이지 내용입니다. 내용을 마음껏 수정하세요!</div>
                        </div>
                        <div class="ti-col"><img class="ti-img" src="https://i.imgur.com/qBKZW5X.png" /> <a class="ti-name">서담</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="page-nav">
        <button class="nav-btn prev-btn">이전</button>
        <button class="nav-btn next-btn">다음</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper', {
        loop: true,
        navigation: {
            nextEl: '.next-btn',
            prevEl: '.prev-btn',
        },
    });
</script>
</body>
</html>
