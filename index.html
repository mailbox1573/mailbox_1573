<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>💌</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        /* 기본 레이아웃 */
        .ti-container { max-width: 950px; margin: 0 auto; font-family: 'Noto Serif KR', 'Nanum Myeongjo', serif; color: #333; padding-bottom: 80px; }
        .ti-header { width: 100%; margin-bottom: 30px; }
        .ti-header img { width: 100%; height: auto; display: block; }
        .ti-content-wrap { padding: 0 40px; }
        
        /* 캐릭터 프로필 영역 */
        .ti-invisible-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 25px; margin-bottom: 20px; align-items: stretch; }
        .ti-col { min-width: 0; }
        .ti-img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }
        .ti-center-abs { display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding: 0 10px; }
        .ti-tags { font-size: 0.85rem; color: #888; margin-bottom: 5px; }
        .ti-quote { position: relative; background-color: #f9f9f9; border: 1px solid #ddd; padding: 20px; border-radius: 15px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        .ti-quote::after { content: ""; position: absolute; bottom: 10px; width: 15px; height: 15px; background-color: #f9f9f9; transform: rotate(45deg); border: 1px solid #ddd; }
        .ti-quote-left::after { left: -8px; border-right: none; border-top: none; }
        .ti-quote-right::after { right: -8px; border-left: none; border-bottom: none; }
        .ti-divider { padding: 10px 0; font-size: 0.9rem; font-weight: bold; color: #555; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .ti-name { margin-top: 15px; font-weight: bold; font-size: 1rem; display: flex; align-items: center; color: #333 !important; text-decoration: none !important; }
        .ti-name::before { content: "📜"; margin-right: 5px; }

        /* --- [간격 조정] 1&2. 디데이 & 테마곡 구역 --- */
        .info-row { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 60px;    /* 프로필과의 간격을 넓힘 */
            margin-bottom: 30px; /* Our Stories와의 간격을 좁힘 */
        }
        .dday-box { font-size: 1.4rem; font-weight: bold; color: #333; }
        .audio-player { 
            display: flex; align-items: center; gap: 12px; background: #f0f2f3; 
            padding: 8px 18px; border-radius: 40px; 
        }
        .play-pause-btn { cursor: pointer; border: none; background: none; font-size: 0.9rem; }
        .time-display { font-size: 0.85rem; color: #444; min-width: 80px; text-align: center; }
        .progress-container { width: 100px; height: 4px; background: #ccc; border-radius: 2px; position: relative; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: #555; border-radius: 2px; }

        /* --- 3&4. 제목 및 가로선 --- */
        .sec-title { font-size: 2.2rem; font-weight: bold; margin-top: 0; margin-bottom: 10px; }
        .sec-hr { border: 0; height: 1px; background: #eee; margin-bottom: 25px; }

        /* --- 5&6. 로그 아코디언 (독립) --- */
        .log-details { border-bottom: 1px solid #eee; padding: 15px 0; }
        .log-details summary { list-style: none; cursor: pointer; font-weight: bold; font-size: 1.15rem; display: flex; align-items: center; }
        .log-details summary::before { content: "▼"; margin-right: 12px; font-size: 0.7rem; }
        .log-content { padding: 25px; font-size: 1rem; line-height: 1.8; color: #444; background: #fafafa; border-radius: 12px; margin-top: 15px; }

        /* --- 7. 이미지 슬라이더 (6번 로그와 완전히 분리됨) --- */
        .image-gallery-sec { margin-top: 40px; }
        .log-slider { width: 100%; border-radius: 15px; overflow: hidden; background: #eee; }
        .log-slider .swiper-slide img { width: 100%; height: auto; max-height: 600px; object-fit: cover; display: block; }

        /* 8. 페이지 전환 버튼 */
        .nav-btn-wrap { display: flex; justify-content: center; gap: 20px; margin: 50px 0; }
        .nav-btn { cursor: pointer; padding: 10px 30px; background: #fff; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<div class="swiper main-swiper">
    <div class="swiper-wrapper">

            <div class="ti-container">

                        <div class="ti-center-abs">
                            <div class="ti-tags">#경이 #두려움 #안도 #탐닉 #죄책 #경외 #항복 #집착 #사랑</div>

                            <div class="ti-divider">두 사람은 서로에게</div>
